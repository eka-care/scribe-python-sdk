<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scribe SDK — Browser Relay Demo</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 1.4rem; }
    .row { display: flex; gap: 12px; align-items: center; margin: 16px 0; }
    button { padding: 10px 16px; font-size: 1rem; border-radius: 8px; border: 1px solid #ccc; cursor: pointer; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    #status { font-weight: 600; }
    pre { background: #f6f8fa; padding: 12px; border-radius: 8px; white-space: pre-wrap; word-break: break-word; }
    fieldset { border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <h1>Scribe SDK — Browser Relay Demo</h1>
  <p>The browser captures your mic and sends audio to a local Python relay that uses the SDK.
     Your <code>client_id</code> / <code>secret</code> stay on the server.</p>

  <fieldset>
    <legend>Mode 1 — Record &amp; upload (single)</legend>
    <div class="row">
      <button id="recStart">● Start recording</button>
      <button id="recStop" disabled>■ Stop &amp; upload</button>
    </div>
  </fieldset>

  <fieldset>
    <legend>Mode 2 — Live stream (WebSocket)</legend>
    <div class="row">
      <button id="streamStart">● Start streaming</button>
      <button id="streamStop" disabled>■ Stop streaming</button>
    </div>
  </fieldset>

  <div class="row">Status: <span id="status">idle</span></div>
  <h3>Result</h3>
  <pre id="result">—</pre>

  <script src="/static/app.js"></script>
</body>
</html>
